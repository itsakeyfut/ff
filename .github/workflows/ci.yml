name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FFMPEG_VERSION: "7.1"
  FFMPEG_PREFIX: /opt/ffmpeg7

jobs:
  # --------------------------------------------------------------------------
  # Format check (no FFmpeg needed)
  # --------------------------------------------------------------------------
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"
          components: rustfmt
      - run: cargo fmt --all -- --check

  # --------------------------------------------------------------------------
  # Clippy (FFmpeg headers required for bindgen)
  # --------------------------------------------------------------------------
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: sudo apt-get install -y nasm pkg-config libclang-dev
      - name: Cache FFmpeg 7.x
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ${{ env.FFMPEG_PREFIX }}
          key: ffmpeg-${{ env.FFMPEG_VERSION }}-ubuntu-${{ runner.arch }}-${{ hashFiles('.github/workflows/ci.yml') }}
      - name: Build FFmpeg 7.x from source
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          wget -q https://ffmpeg.org/releases/ffmpeg-${{ env.FFMPEG_VERSION }}.tar.xz
          tar xf ffmpeg-${{ env.FFMPEG_VERSION }}.tar.xz
          cd ffmpeg-${{ env.FFMPEG_VERSION }}
          ./configure \
            --prefix=${{ env.FFMPEG_PREFIX }} \
            --disable-programs \
            --disable-doc \
            --disable-everything \
            --enable-avcodec \
            --enable-avformat \
            --enable-avutil \
            --enable-swscale \
            --enable-swresample \
            --enable-avfilter \
            --enable-decoder=h264,aac,mp3,flac,vorbis,opus,pcm_s16le,pcm_f32le \
            --enable-encoder=aac,pcm_s16le,mpeg4 \
            --enable-demuxer=mov,mp4,matroska,mp3,flac,ogg,wav,srt \
            --enable-muxer=ipod,mp4,mov,matroska \
            --enable-parser=h264,aac,mpegaudio,flac,vorbis,opus \
            --enable-protocol=file \
            --enable-shared \
            --disable-static
          make -j$(nproc)
          sudo make install
      - name: Set FFmpeg environment
        run: |
          echo "PKG_CONFIG_PATH=${{ env.FFMPEG_PREFIX }}/lib/pkgconfig" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=${{ env.FFMPEG_PREFIX }}/lib" >> $GITHUB_ENV
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all --all-features -- -D warnings

  # --------------------------------------------------------------------------
  # Tests
  # --------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y nasm pkg-config libclang-dev

      - name: Cache FFmpeg 7.x (Linux)
        if: runner.os == 'Linux'
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ${{ env.FFMPEG_PREFIX }}
          key: ffmpeg-${{ env.FFMPEG_VERSION }}-ubuntu-${{ runner.arch }}-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Build FFmpeg 7.x from source (Linux)
        if: runner.os == 'Linux' && steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          wget -q https://ffmpeg.org/releases/ffmpeg-${{ env.FFMPEG_VERSION }}.tar.xz
          tar xf ffmpeg-${{ env.FFMPEG_VERSION }}.tar.xz
          cd ffmpeg-${{ env.FFMPEG_VERSION }}
          ./configure \
            --prefix=${{ env.FFMPEG_PREFIX }} \
            --disable-programs \
            --disable-doc \
            --disable-everything \
            --enable-avcodec \
            --enable-avformat \
            --enable-avutil \
            --enable-swscale \
            --enable-swresample \
            --enable-avfilter \
            --enable-decoder=h264,aac,mp3,flac,vorbis,opus,pcm_s16le,pcm_f32le \
            --enable-encoder=aac,pcm_s16le,mpeg4 \
            --enable-demuxer=mov,mp4,matroska,mp3,flac,ogg,wav,srt \
            --enable-muxer=ipod,mp4,mov,matroska \
            --enable-parser=h264,aac,mpegaudio,flac,vorbis,opus \
            --enable-protocol=file \
            --enable-shared \
            --disable-static
          make -j$(nproc)
          sudo make install

      - name: Set FFmpeg environment (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "PKG_CONFIG_PATH=${{ env.FFMPEG_PREFIX }}/lib/pkgconfig" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=${{ env.FFMPEG_PREFIX }}/lib" >> $GITHUB_ENV

      - name: Install FFmpeg 7.x (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg pkg-config

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all --all-features

  # --------------------------------------------------------------------------
  # Docs
  # --------------------------------------------------------------------------
  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: sudo apt-get install -y nasm pkg-config libclang-dev
      - name: Cache FFmpeg 7.x
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ${{ env.FFMPEG_PREFIX }}
          key: ffmpeg-${{ env.FFMPEG_VERSION }}-ubuntu-${{ runner.arch }}-${{ hashFiles('.github/workflows/ci.yml') }}
      - name: Build FFmpeg 7.x from source
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          wget -q https://ffmpeg.org/releases/ffmpeg-${{ env.FFMPEG_VERSION }}.tar.xz
          tar xf ffmpeg-${{ env.FFMPEG_VERSION }}.tar.xz
          cd ffmpeg-${{ env.FFMPEG_VERSION }}
          ./configure \
            --prefix=${{ env.FFMPEG_PREFIX }} \
            --disable-programs \
            --disable-doc \
            --disable-everything \
            --enable-avcodec \
            --enable-avformat \
            --enable-avutil \
            --enable-swscale \
            --enable-swresample \
            --enable-avfilter \
            --enable-decoder=h264,aac,mp3,flac,vorbis,opus,pcm_s16le,pcm_f32le \
            --enable-encoder=aac,pcm_s16le,mpeg4 \
            --enable-demuxer=mov,mp4,matroska,mp3,flac,ogg,wav,srt \
            --enable-muxer=ipod,mp4,mov,matroska \
            --enable-parser=h264,aac,mpegaudio,flac,vorbis,opus \
            --enable-protocol=file \
            --enable-shared \
            --disable-static
          make -j$(nproc)
          sudo make install
      - name: Set FFmpeg environment
        run: |
          echo "PKG_CONFIG_PATH=${{ env.FFMPEG_PREFIX }}/lib/pkgconfig" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=${{ env.FFMPEG_PREFIX }}/lib" >> $GITHUB_ENV
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
